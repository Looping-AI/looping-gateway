version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"
          - "workers-ai-provider"
      ai-sdk:
        patterns:
          - "ai"
          - "agents"
          - "@a2a-js/sdk"
      slack:
        patterns:
          - "@chat-adapter/*"
          - "chat"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
      dev-tooling:
        patterns:
          - "eslint"
          - "@typescript-eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "typescript"
          - "@types/*"
          - "vitest"
          - "husky"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
